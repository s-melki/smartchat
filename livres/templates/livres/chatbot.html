<!DOCTYPE html>
<html>
<head>
    <title>Chatbot Bibliothèque</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; }
        #message { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>Chatbot Bibliothèque</h1>
    <div id="chat"></div>
    <input type="text" id="message" placeholder="Posez votre question...">
    <button onclick="sendMessage()">Envoyer</button>
    <br><a href="{% url 'livre_list' %}">Retour à la liste des livres</a>

    <script>
        function sendMessage() {
            const message = document.getElementById('message').value;
            if (!message) return;
            addMessage('Vous: ' + message);
            document.getElementById('message').value = '';

            fetch('/livres/chatbot/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: 'message=' + encodeURIComponent(message)
            })
            .then(response => response.json())
            .then(data => {
                addMessage('Chatbot: ' + data.response);
            });
        }

        function addMessage(text) {
            const chat = document.getElementById('chat');
            const p = document.createElement('p');
            p.textContent = text;
            chat.appendChild(p);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
